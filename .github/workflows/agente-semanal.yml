name: Revision semanal de cartera

on:
  # Se ejecuta solo, segun este horario (formato cron estandar, en UTC)
  schedule:
    - cron: '0 9 * * 1'   # todos los lunes a las 9:00 UTC (11:00 hora de Madrid en verano)

  # Tambien se puede lanzar a mano, o disparar desde Telegram (/rebalancear, /confirmar)
  workflow_dispatch:
    inputs:
      mensaje:
        description: 'Instruccion personalizada para el agente (opcional)'
        required: false
        default: ''
      modo:
        description: 'proponer (no ejecuta nada) o ejecutar (compra/vende de verdad)'
        required: false
        default: 'ejecutar'

permissions:
  contents: write

# Mismo grupo que "Bot de Telegram": evita que ambos hagan push a la vez
concurrency:
  group: escrituras-al-repo
  cancel-in-progress: false

jobs:
  ejecutar-agente:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar el agente
        run: |
          if [ -n "${{ github.event.inputs.mensaje }}" ]; then
            python agent.py "${{ github.event.inputs.mensaje }}"
          else
            python agent.py
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AGENT_MODE: ${{ github.event.inputs.modo || 'ejecutar' }}
          # Solo respetamos la pausa en la ejecucion automatica semanal (cron).
          # Si lo lanzas a mano (Run workflow) o desde /rebalancear, se ejecuta igualmente.
          RESPETAR_PAUSA: ${{ github.event_name == 'schedule' && '1' || '0' }}

      - name: Guardar el nuevo estado en el repositorio
        run: |
          git config user.name "agente-inversion-bot"
          git config user.email "actions@users.noreply.github.com"
          git add portfolio_state.json
          git diff --cached --quiet && echo "Sin cambios que guardar" || git commit -m "Snapshot cartera $(date +%F)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push rechazado (intento $i), reintentando tras sincronizar..."
            sleep 5
          done
