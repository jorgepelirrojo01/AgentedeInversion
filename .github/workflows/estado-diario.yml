name: Estado diario por Telegram

on:
  schedule:
    - cron: '0 8 * * *'   # todos los dias a las 8:00 UTC (~10:00 Madrid en verano)
  workflow_dispatch:

jobs:
  enviar-estado:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install yfinance requests

      - name: Enviar estado por Telegram
        run: python daily_status.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
